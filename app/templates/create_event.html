{% extends "base.html" %}

{% block title %}스케줄 생성 | HAN Scheduler{% endblock %}

{% block content %}
<section class="auth-wrap">
    <div class="auth-card" style="max-width: 700px; text-align: left;">
        <h1 class="page-title">스케줄 생성</h1>
        <p class="page-desc">관리자가 날짜와 시간을 지정해 스케줄을 생성합니다.</p>

        <form action="/admin/create" method="post" class="form-grid">
            <label>스케줄 제목</label>
            <input type="text" name="title" required>

            <label>날짜</label>
            <input type="date" name="date_value" required>

            <label>시작 시간</label>
            <input type="time" name="start_time" required>

            <label>정원</label>
            <input type="number" name="capacity" min="1" required>

            <label>설명</label>
            <textarea name="description" rows="4" placeholder="스케줄 설명을 입력하세요."></textarea>

            <div style="margin-top: 16px;">
                <button type="submit" class="btn">생성하기</button>
                <a href="/admin" class="btn btn-outline">취소</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
